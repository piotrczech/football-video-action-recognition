# configs/train.rf.yaml

runtime:
  seed: 42
training:
  epochs: 3
  batch_size: 2
  learning_rate: 0.0001

rfdetr:
  epochs: 3
  batch_size: 2
  grad_accum_steps: 4
  learning_rate: 0.0001
  resolution: 736
  checkpoint_interval: 1
  max_train_samples: null
  max_valid_samples: null
  detection_confidence: 0.25
  device: cuda
  weights: default
