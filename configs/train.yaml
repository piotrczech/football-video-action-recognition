# Common parameters
training:
  epochs: 3
  batch_size: 2
  learning_rate: 0.0001

runtime:
  seed: 42

# Active model config.
model:
  name: yolo

yolo:
  image_size: 640
  epochs: 4
  batch_size: 8
  learning_rate: 0.001
  max_train_samples: null
  max_valid_samples: null
  detection_confidence: 0.25
  weights: yolov8n.pt
rfdetr:
  resolution: 736
  epochs: 3
  batch_size: 2
  grad_accum_steps: 4
  learning_rate: 0.0001
  checkpoint_interval: 1
  max_train_samples: null
  max_valid_samples: null
  detection_confidence: 0.25
  device: cuda
  weights: default
