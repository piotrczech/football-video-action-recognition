# Common parameters
training:
  epochs: 10
  batch_size: 2
  learning_rate: 0.0001

runtime:
  seed: 42

# Active model config (defaulting to rf_detr based on your current work)
model:
  name: rf_detr
  backbone: dinov2_vits14 
  patch_size: 14
  img_size: 728
  weights: "rfdetr-m.pt"

# YOLO specific config (preserved from origin/master)
yolo:
  image_size: 640
  epochs: 12
  batch_size: 8
  learning_rate: 0.001
  max_train_samples: null
  max_valid_samples: null
  detection_confidence: 0.25
  weights: yolov8n.pt